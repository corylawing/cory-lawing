<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Expense Guard — interactive demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* =======================================================================
   Expense Guard — AI expense-compliance demo. Finance uploads expenses,
   they're cross-checked against CRM (Salesforce) activity, and the AI
   flags policy breaches (over threshold) and customer-booked expenses
   with no matching account activity that day. All data is mock.
   ======================================================================= */
:root{
  --bg:#0b0d12; --panel:#13161f; --panel2:#191d29; --line:#272d3c; --line2:#333a4d;
  --ink:#eef1f6; --ink2:#c7cdda; --muted:#8a93a6; --faint:#5d6577;
  --lime:#d9f77b; --lime-ink:#0a0a0a; --lime-line:rgba(217,247,123,.4);
  --teal:#3dc6ce; --amber:#f2c879; --rose:#f2778c; --violet:#b79cff; --green:#5bd08a;
  --green-soft:rgba(91,208,138,.13); --amber-soft:rgba(242,200,121,.13);
  --rose-soft:rgba(242,119,140,.13); --violet-soft:rgba(183,156,255,.13);
  --radius:16px;
}
*{box-sizing:border-box;}
html,body{margin:0;min-height:100%;}
body{background:var(--bg);color:var(--ink);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-size:14px;line-height:1.5;}
.mono{font-family:"Geist Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
.num{font-variant-numeric:tabular-nums;}
button{font-family:inherit;cursor:pointer;}
h1,h2,h3{margin:0;}
.app{max-width:1180px;margin:0 auto;padding:20px 20px 90px;}
.muted{color:var(--muted);} .faint{color:var(--faint);}

/* top bar */
.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
.top__mark{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--lime),#aee04f);display:grid;place-items:center;color:var(--lime-ink);flex-shrink:0;box-shadow:0 8px 22px -8px var(--lime);}
.top__eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
.top__title{font-size:19px;font-weight:800;letter-spacing:-.02em;}
.top__spacer{flex:1;}
.pill{font-size:11.5px;color:var(--ink2);border:1px solid var(--line2);border-radius:999px;padding:5px 11px;display:inline-flex;align-items:center;gap:6px;}
.pill .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:600;font-size:13px;border-radius:11px;padding:9px 15px;border:1px solid transparent;transition:.14s;white-space:nowrap;}
.btn svg{width:16px;height:16px;}
.btn--lime{background:var(--lime);color:var(--lime-ink);}
.btn--lime:hover{filter:brightness(1.06);transform:translateY(-1px);}
.btn--ghost{background:transparent;border-color:var(--line2);color:var(--ink2);}
.btn--ghost:hover{border-color:var(--faint);color:var(--ink);}
.btn--rose{background:var(--rose);color:#0a0a0a;}
.btn--green{background:var(--green);color:#062315;}
.btn--sm{padding:7px 12px;font-size:12px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);}
.card__b{padding:18px;}
.eyebrow{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:700;}

/* ---------- UPLOAD ---------- */
.upload{max-width:560px;margin:30px auto;text-align:center;}
.drop{border:1.5px dashed var(--line2);border-radius:var(--radius);padding:40px 26px;background:var(--panel);transition:.2s;}
.drop:hover{border-color:var(--lime-line);background:var(--panel2);}
.drop__ic{width:60px;height:60px;border-radius:16px;background:var(--panel2);border:1px solid var(--line);display:grid;place-items:center;margin:0 auto 16px;color:var(--lime);}
.drop h2{font-size:20px;margin-bottom:6px;}
.drop p{color:var(--muted);font-size:13.5px;margin:0 auto 18px;max-width:380px;}
.synccheck{display:inline-flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink2);margin-top:16px;}
.cbx{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line2);display:grid;place-items:center;}
.cbx.on{background:var(--lime);border-color:var(--lime);}

/* processing */
.proc{max-width:420px;margin:36px auto;}
.proc__ring{width:70px;height:70px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--lime);margin:0 auto 22px;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.pstep{display:flex;align-items:center;gap:11px;padding:9px 0;color:var(--faint);font-size:13.5px;transition:.25s;}
.pstep.on{color:var(--ink);} .pstep.done{color:var(--ink2);}
.pstep .d{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--line2);flex-shrink:0;display:grid;place-items:center;font-size:10px;}
.pstep.done .d{background:var(--green);border-color:var(--green);color:#06231e;}
.pstep.on .d{border-color:var(--lime);}

/* ---------- AI banner ---------- */
.aibanner{background:linear-gradient(120deg,rgba(217,247,123,.08),rgba(217,247,123,.02));border:1px solid var(--lime-line);border-radius:var(--radius);padding:16px 18px;display:flex;gap:13px;margin-bottom:18px;}
.aibanner__ic{width:36px;height:36px;border-radius:11px;background:var(--lime);color:var(--lime-ink);display:grid;place-items:center;flex-shrink:0;}
.aibanner__tag{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--lime);border:1px solid var(--lime-line);border-radius:999px;padding:2px 8px;}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px;}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 16px;}
.kpi__l{font-size:11.5px;color:var(--muted);}
.kpi__v{font-size:24px;font-weight:800;margin-top:7px;letter-spacing:-.02em;}
.kpi__s{font-size:11.5px;margin-top:3px;}

/* thresholds */
.policy{display:flex;align-items:center;gap:13px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 16px;margin-bottom:18px;}
.policy__lbl{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:700;display:flex;align-items:center;gap:7px;}
.thr{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink2);}
.thr input{width:62px;background:var(--panel2);border:1px solid var(--line2);border-radius:8px;color:var(--ink);padding:5px 7px;font-size:12.5px;text-align:right;outline:none;font-family:inherit;}
.thr input:focus{border-color:var(--lime-line);}

/* filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.chip{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border:1px solid var(--line2);border-radius:999px;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--panel);transition:.13s;}
.chip.on{border-color:var(--lime);background:rgba(217,247,123,.1);color:var(--lime);}
.chip .ct{font-size:11px;opacity:.8;}

/* table */
.tblwrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.thead,.trow{display:grid;grid-template-columns:96px 1.5fr 1.1fr 92px 1.2fr 40px;gap:12px;align-items:center;}
.thead{padding:11px 18px;border-bottom:1px solid var(--line);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:700;}
.thead .r,.trow .r{text-align:right;}
.trow{padding:13px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s;}
.trow:last-child{border-bottom:none;}
.trow:hover{background:var(--panel2);}
.trow.flag{box-shadow:inset 3px 0 0 var(--flagc,transparent);}
.merch{font-weight:600;font-size:13.5px;}
.sub{font-size:11.5px;color:var(--muted);margin-top:1px;}
.amt{font-weight:700;font-size:14px;}
.acct{font-size:12.5px;}
.cattag{font-size:10.5px;font-weight:700;letter-spacing:.02em;border-radius:6px;padding:2px 7px;background:var(--panel2);color:var(--ink2);border:1px solid var(--line2);white-space:nowrap;}
.status{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;border-radius:999px;padding:3px 10px;white-space:nowrap;}
.s-clear{background:var(--green-soft);color:var(--green);}
.s-over{background:var(--amber-soft);color:var(--amber);}
.s-noact{background:var(--rose-soft);color:var(--rose);}
.s-dup{background:var(--violet-soft);color:var(--violet);}
.s-rcpt{background:var(--amber-soft);color:var(--amber);}
.s-appr{background:rgba(91,208,138,.18);color:var(--green);}
.s-rej{background:var(--rose-soft);color:var(--rose);}
.chev{color:var(--faint);}

/* detail drawer */
.scrim{position:fixed;inset:0;background:rgba(6,8,14,.6);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:.2s;z-index:40;}
.scrim.on{opacity:1;pointer-events:auto;}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(480px,100%);background:var(--panel);border-left:1px solid var(--line);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column;}
.drawer.on{transform:none;}
.drawer__h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px;}
.drawer__x{margin-left:auto;width:32px;height:32px;border-radius:9px;border:1px solid var(--line2);background:var(--panel2);color:var(--ink2);font-size:18px;line-height:1;}
.drawer__b{flex:1;overflow:auto;padding:20px;}
.drawer__f{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:9px;flex-wrap:wrap;}
.bigamt{font-size:30px;font-weight:800;letter-spacing:-.02em;}
.verdict{border-radius:12px;padding:14px 16px;margin:16px 0;border:1px solid var(--line2);}
.verdict__h{display:flex;align-items:center;gap:9px;font-weight:700;margin-bottom:8px;}
.verdict ul{margin:0;padding-left:18px;font-size:13px;line-height:1.6;color:var(--ink2);}
.kv{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;}
.kv:last-child{border-bottom:none;}
.kv .k{color:var(--muted);}

/* activity timeline */
.tl{margin-top:6px;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
.tl__r{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--line);font-size:12.5px;}
.tl__r:last-child{border-bottom:none;}
.tl__r .d{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0;}
.tl__r.gap{background:var(--rose-soft);}
.tl__r.gap .d{background:var(--rose);}
.tl__r.match{background:var(--green-soft);}
.tl__r.match .d{background:var(--green);}

/* spend memory cards */
.memgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;}
.memcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;}
.memcard.flag{border-color:var(--rose);box-shadow:0 0 0 1px var(--rose-soft);}
.memcard__top{display:flex;align-items:center;gap:9px;}
.memava{width:30px;height:30px;border-radius:50%;background:var(--panel2);border:1px solid var(--line2);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--ink2);flex-shrink:0;}
.delta{font-size:12px;font-weight:800;}
.delta.hi{color:var(--rose);} .delta.up{color:var(--amber);} .delta.dn{color:var(--green);}
.membar{position:relative;height:7px;border-radius:999px;background:var(--panel2);margin:11px 0 9px;overflow:hidden;}
.membar__fill{height:100%;border-radius:999px;}
.membar__avg{position:absolute;top:-2px;bottom:-2px;left:55.5%;width:2px;background:var(--ink2);opacity:.65;z-index:2;}
.memcard__foot{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);}
@media(max-width:820px){ .memgrid{grid-template-columns:repeat(2,1fr);} }
@media(max-width:680px){ .memgrid{grid-template-columns:1fr;} }

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--lime);color:var(--lime-ink);padding:11px 18px;border-radius:11px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:.25s;z-index:90;box-shadow:0 14px 36px rgba(0,0,0,.5);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.fade{animation:fadeup .35s ease;}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:820px){ .kpis{grid-template-columns:repeat(2,1fr);} }
@media(max-width:680px){
  .thead{display:none;}
  .trow{grid-template-columns:1fr auto;gap:8px 12px;}
  .trow .cat-cell{grid-column:1;} .trow .amt-cell{grid-column:2;text-align:right;}
  .trow .acct-cell{grid-column:1/-1;} .trow .status-cell{grid-column:1/-1;}
  .trow .chev{display:none;}
  .policy{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="top__mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6l8-4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div>
      <div class="top__eyebrow mono">Finance · AI expense compliance</div>
      <div class="top__title">Expense Guard</div>
    </div>
    <div class="top__spacer"></div>
    <span class="pill"><span class="dot"></span> Salesforce activity synced</span>
    <button class="btn btn--ghost" id="newBatchBtn" onclick="startUpload()" style="display:none">Upload new batch</button>
  </div>
  <div id="stage"></div>
</div>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"></aside>
<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2300);}
const money=n=>'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const money0=n=>'$'+Number(n).toLocaleString('en-US',{maximumFractionDigits:0});

/* editable policy thresholds (set by Finance) */
let THRESH={Rideshare:50, Meals:75, Hotel:300, Airfare:650, 'Client entertainment':400};
const CATCAP={Rideshare:'Rideshare',Meals:'Meals',Hotel:'Hotel',Airfare:'Airfare','Client entertainment':'Client entertainment'};

/* Salesforce activity by account (March) — used for the cross-check */
const ACTIVITY={
  'Atlas Lyon':['Mar 3','Mar 12','Mar 19'],
  'Bright Systems':['Mar 5','Mar 14'],
  'Gent Digital':['Mar 8','Mar 21'],
  'Pearl Logistics':['Mar 2','Mar 17'],
  'Camden Industries':['Mar 11']
};
const DAYNUM=d=>parseInt(d.replace('Mar ',''),10);

/* uploaded expense batch (mock) */
let EXPENSES=[
  {id:'E-1041', emp:'Mara Lin',   cat:'Client entertainment', merch:'Le Comptoir (dinner, 4)', amt:312.40, date:'Mar 12', acct:'Atlas Lyon',      rcpt:true},
  {id:'E-1042', emp:'Mara Lin',   cat:'Rideshare',            merch:'Uber — airport to client', amt:84.20,  date:'Mar 12', acct:'Atlas Lyon',      rcpt:true},
  {id:'E-1043', emp:'Jordan Diaz', cat:'Meals',               merch:'Sweetgreen (lunch)',        amt:21.50,  date:'Mar 14', acct:'Bright Systems',  rcpt:true},
  {id:'E-1044', emp:'Jordan Diaz', cat:'Client entertainment', merch:'Roka Akor (dinner, 3)',    amt:486.00, date:'Mar 15', acct:'Bright Systems',  rcpt:true},
  {id:'E-1045', emp:'Sam Okafor',  cat:'Hotel',               merch:'Marriott — 1 night',        amt:389.00, date:'Mar 20', acct:'Gent Digital',    rcpt:true},
  {id:'E-1046', emp:'Sam Okafor',  cat:'Rideshare',           merch:'Lyft — office to dinner',   amt:18.75,  date:'Mar 21', acct:'Gent Digital',    rcpt:true},
  {id:'E-1047', emp:'Priya V.',    cat:'Meals',               merch:'Hotel breakfast + dinner',  amt:96.30,  date:'Mar 17', acct:'Pearl Logistics', rcpt:true},
  {id:'E-1048', emp:'Priya V.',    cat:'Client entertainment', merch:'The Vault (drinks, 2)',    amt:140.00, date:'Mar 18', acct:'Pearl Logistics', rcpt:true},
  {id:'E-1049', emp:'Alex Reed',   cat:'Airfare',             merch:'Delta — JFK→ORD (economy)', amt:412.00, date:'Mar 10', acct:null,              rcpt:true},
  {id:'E-1050', emp:'Alex Reed',   cat:'Meals',               merch:'Nobu (client lunch, 2)',    amt:188.00, date:'Mar 23', acct:'Camden Industries',rcpt:true},
  {id:'E-1051', emp:'Mara Lin',    cat:'Client entertainment', merch:'Le Comptoir (dinner, 4)',  amt:312.40, date:'Mar 12', acct:'Atlas Lyon',      rcpt:true, dup:'E-1041'},
  {id:'E-1052', emp:'Jordan Diaz', cat:'Rideshare',           merch:'Uber — late night',          amt:67.90,  date:'Mar 26', acct:null,              rcpt:false},
  {id:'E-1053', emp:'Sam Okafor',  cat:'Meals',               merch:'Team lunch (5)',            amt:142.00, date:'Mar 19', acct:null,              rcpt:true},
  {id:'E-1054', emp:'Priya V.',    cat:'Hotel',               merch:'Hilton — 1 night',          amt:268.00, date:'Mar 17', acct:'Pearl Logistics', rcpt:true}
];
let resolutions={}; // id -> 'approved' | 'rejected'

/* spend "memory" — each employee's trailing 3-month average for this period.
   The app flags anyone running significantly (>40%) above their own baseline. */
const EMP_AVG={'Mara Lin':430,'Jordan Diaz':560,'Sam Okafor':545,'Priya V.':515,'Alex Reed':540};
const OVER_AVG_PCT=40; // "significantly above" threshold
function empSpend(){
  const tot={};
  EXPENSES.forEach(e=>{tot[e.emp]=(tot[e.emp]||0)+e.amt;});
  return Object.keys(EMP_AVG).map(emp=>{
    const total=tot[emp]||0, avg=EMP_AVG[emp];
    const deltaPct=Math.round((total-avg)/avg*100);
    return {emp,total,avg,deltaPct,flag:deltaPct>=OVER_AVG_PCT};
  }).sort((a,b)=>b.deltaPct-a.deltaPct);
}

/* ---- evaluation ---- */
function evaluate(e){
  if(resolutions[e.id]==='approved') return {key:'appr',label:'Approved',cls:'s-appr',color:'var(--green)',flag:false,reasons:['Manually approved by Finance.']};
  if(resolutions[e.id]==='rejected') return {key:'rej',label:'Rejected',cls:'s-rej',color:'var(--rose)',flag:true,reasons:['Rejected by Finance — sent back to employee.']};
  const reasons=[]; let key='clear';
  const cap=THRESH[e.cat];
  const over = cap!=null && e.amt>cap;
  const noAct = e.acct && !(ACTIVITY[e.acct]||[]).includes(e.date);
  const dup = !!e.dup;
  const noRcpt = e.rcpt===false;
  // priority: noActivity > over > dup > receipt
  if(noAct){ key='noact'; }
  else if(over){ key='over'; }
  else if(dup){ key='dup'; }
  else if(noRcpt){ key='rcpt'; }
  if(over) reasons.push(`${e.cat} policy cap is ${money0(cap)} — this expense is ${money(e.amt)}, ${money(e.amt-cap)} over.`);
  if(noAct){
    const acts=(ACTIVITY[e.acct]||[]).slice().sort((a,b)=>DAYNUM(a)-DAYNUM(b));
    const nearest=acts.reduce((best,d)=>Math.abs(DAYNUM(d)-DAYNUM(e.date))<Math.abs(DAYNUM(best)-DAYNUM(e.date))?d:best,acts[0]);
    const gap=nearest?Math.abs(DAYNUM(nearest)-DAYNUM(e.date)):'—';
    reasons.push(`Booked to <b>${e.acct}</b> on ${e.date}, but no call, meeting, or visit is logged at that account that day. Nearest activity: ${nearest||'none'}${nearest?` (${gap} day${gap===1?'':'s'} off)`:''}.`);
  }
  if(dup) reasons.push(`Possible duplicate of ${e.dup} — same merchant, amount, and date.`);
  if(noRcpt) reasons.push('No receipt attached.');
  if(key==='clear') reasons.push(e.acct?`Within policy and matches a logged activity at ${e.acct} on ${e.date}.`:'Within policy. Internal expense (no customer link required).');
  const map={
    clear:{label:'Cleared',cls:'s-clear',color:'var(--green)'},
    over:{label:'Over policy',cls:'s-over',color:'var(--amber)'},
    noact:{label:'No CRM activity',cls:'s-noact',color:'var(--rose)'},
    dup:{label:'Possible duplicate',cls:'s-dup',color:'var(--violet)'},
    rcpt:{label:'Missing receipt',cls:'s-rcpt',color:'var(--amber)'}
  }[key];
  return {key,label:map.label,cls:map.cls,color:map.color,flag:key!=='clear',reasons,over,noAct,dup,noRcpt};
}
function stats(){
  let total=0,atRisk=0,flagged=0,cleared=0;
  EXPENSES.forEach(e=>{const v=evaluate(e);total+=e.amt;if(v.flag){flagged++;atRisk+=e.amt;}else cleared++;});
  return {count:EXPENSES.length,total,atRisk,flagged,cleared};
}

/* ---------- UPLOAD ---------- */
let synced=true;
function renderUpload(){
  $('newBatchBtn').style.display='none';
  $('stage').innerHTML=`
  <div class="upload fade">
    <div class="drop" onclick="processBatch()">
      <div class="drop__ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 16V4M12 4l-4 4M12 4l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></div>
      <h2>Upload expense batch</h2>
      <p>Drop a CSV or receipt export from your card provider. Expense Guard parses every line, matches it to the employee and the customer account, and reviews it against policy.</p>
      <button class="btn btn--lime">Choose file &amp; process</button>
      <div class="synccheck" onclick="event.stopPropagation();synced=!synced;renderUpload()">
        <span class="cbx ${synced?'on':''}">${synced?check():''}</span> Cross-check against Salesforce activity
      </div>
    </div>
    <p class="muted" style="font-size:12.5px;margin-top:14px">Sample batch: <b>March expenses</b> · 14 line items · 5 employees</p>
  </div>`;
}
function check(){return `<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6.2L4.6 9 10 2.6" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}
function startUpload(){renderUpload();}

/* ---------- PROCESSING ---------- */
function processBatch(){
  const steps=['Parsing 14 line items','Matching to employees & cards', synced?'Cross-checking Salesforce activity':'Skipping CRM cross-check','Applying Finance policy thresholds','AI review & flagging'];
  $('stage').innerHTML=`<div class="proc fade"><div class="proc__ring"></div><div id="psteps">${steps.map((s,i)=>`<div class="pstep ${i===0?'on':''}" id="ps${i}"><span class="d">${i+1}</span>${s}</div>`).join('')}</div></div>`;
  let i=0;
  const run=()=>{
    if(i>0){const p=$('ps'+(i-1));p.classList.remove('on');p.classList.add('done');p.querySelector('.d').innerHTML=check2();}
    if(i>=steps.length){setTimeout(renderReview,400);return;}
    $('ps'+i).classList.add('on');i++;setTimeout(run,560);
  };
  setTimeout(run,420);
}
function check2(){return `<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6.2L4.6 9 10 2.6" stroke="#06231e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}

/* ---------- REVIEW ---------- */
let filter='all';
function renderReview(){
  $('newBatchBtn').style.display='';
  const s=stats();
  const overN=EXPENSES.filter(e=>evaluate(e).key==='over').length;
  const noactN=EXPENSES.filter(e=>evaluate(e).key==='noact').length;
  const otherN=EXPENSES.filter(e=>['dup','rcpt'].includes(evaluate(e).key)).length;
  const mem=empSpend(); const memFlags=mem.filter(m=>m.flag);
  $('stage').innerHTML=`
  <div class="fade">
    <div class="aibanner">
      <div class="aibanner__ic"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.6 4.6L18 9l-4.4 1.4L12 15l-1.6-4.6L6 9z" fill="currentColor"/></svg></div>
      <div><div style="display:flex;align-items:center;gap:9px;margin-bottom:3px"><b>AI review complete</b><span class="aibanner__tag">AI generated</span></div>
      <div style="font-size:13.5px;line-height:1.6">Reviewed <b>${s.count} expenses</b> (${money0(s.total)}). Flagged <b>${s.flagged}</b> totalling <b style="color:var(--rose)">${money0(s.atRisk)} at risk</b> — ${overN} over policy, ${noactN} with no matching customer activity${otherN?`, ${otherN} other`:''}. ${s.cleared} auto-cleared and ready to post back to Salesforce.${memFlags.length?` Memory check: <b style="color:var(--amber)">${memFlags.map(m=>m.emp).join(', ')}</b> ${memFlags.length===1?'is':'are'} running well above ${memFlags.length===1?'their':'their'} monthly average — flagged for inspection.`:''}</div></div>
    </div>

    <div class="kpis">
      ${kpi('Expenses',s.count,'this batch','var(--ink)')}
      ${kpi('Total amount',money0(s.total),'submitted','var(--ink)')}
      ${kpi('Flagged',s.flagged,'need review','var(--rose)')}
      ${kpi('At risk',money0(s.atRisk),'pending sign-off','var(--amber)')}
      ${kpi('Auto-cleared',s.cleared,'policy + activity OK','var(--green)')}
    </div>

    <div class="policy">
      <div class="policy__lbl">⚙ Policy thresholds <span class="faint" style="text-transform:none;letter-spacing:0;font-weight:500">— set by Finance, applied live</span></div>
      ${Object.keys(THRESH).map(c=>`<label class="thr">${c} <span class="faint">$</span><input type="number" value="${THRESH[c]}" min="0" onchange="setThr('${c}',this.value)"></label>`).join('')}
    </div>

    <div class="filters">
      ${chip('all','All',s.count)}
      ${chip('flag','Flagged',s.flagged)}
      ${chip('noact','No CRM activity',noactN)}
      ${chip('over','Over policy',overN)}
      ${chip('clear','Cleared',s.cleared)}
    </div>

    <div class="tblwrap">
      <div class="thead"><div>Date</div><div>Expense</div><div>Account</div><div class="r">Amount</div><div>AI status</div><div></div></div>
      <div id="rows"></div>
    </div>

    <div class="eyebrow" style="margin:24px 0 10px;display:flex;align-items:center;gap:8px">🧠 Spend memory — this batch vs. each employee's monthly average</div>
    <div class="memgrid">
      ${mem.map(m=>{const ratio=Math.min(180,m.total/m.avg*100);const fillW=(ratio/180*100).toFixed(0);const initials=m.emp.split(' ').map(w=>w[0]).join('').slice(0,2);
        return `<div class="memcard ${m.flag?'flag':''}">
          <div class="memcard__top">
            <div class="memava">${initials}</div>
            <div style="flex:1;min-width:0"><div style="font-weight:600">${m.emp}</div><div class="sub">avg ${money0(m.avg)}/mo</div></div>
            <div class="delta ${m.deltaPct>=OVER_AVG_PCT?'hi':m.deltaPct>=0?'up':'dn'}">${m.deltaPct>=0?'+':''}${m.deltaPct}%</div>
          </div>
          <div class="membar"><div class="membar__avg" title="monthly average"></div><div class="membar__fill" style="width:${fillW}%;background:${m.flag?'var(--rose)':'var(--lime)'}"></div></div>
          <div class="memcard__foot"><span class="num" style="font-weight:700">${money0(m.total)}</span> this batch ${m.flag?`<span class="status s-noact" style="margin-left:auto">⚠ Inspect</span>`:`<span class="muted" style="margin-left:auto;font-size:11.5px">within range</span>`}</div>
        </div>`;}).join('')}
    </div>
  </div>`;
  renderRows();
}
function kpi(l,v,s,c){return `<div class="kpi"><div class="kpi__l">${l}</div><div class="kpi__v num" style="color:${c}">${v}</div><div class="kpi__s muted">${s}</div></div>`;}
function chip(k,l,n){return `<span class="chip ${filter===k?'on':''}" onclick="filter='${k}';renderRows();syncChips()">${l} <span class="ct num">${n}</span></span>`;}
function syncChips(){document.querySelectorAll('.chip').forEach(c=>{});renderReviewChips();}
function renderReviewChips(){ // re-render the chip row active state
  const s=stats();const overN=EXPENSES.filter(e=>evaluate(e).key==='over').length;const noactN=EXPENSES.filter(e=>evaluate(e).key==='noact').length;
  const wrap=document.querySelector('.filters');if(!wrap)return;
  wrap.innerHTML=chip('all','All',s.count)+chip('flag','Flagged',s.flagged)+chip('noact','No CRM activity',noactN)+chip('over','Over policy',overN)+chip('clear','Cleared',s.cleared);
}
function passFilter(e,v){
  if(filter==='all')return true;
  if(filter==='flag')return v.flag;
  if(filter==='clear')return !v.flag;
  return v.key===filter;
}
function renderRows(){
  const el=$('rows');if(!el)return;
  const list=EXPENSES.filter(e=>passFilter(e,evaluate(e)));
  el.innerHTML=list.map(e=>{const v=evaluate(e);
    return `<div class="trow ${v.flag?'flag':''}" style="--flagc:${v.flag?v.color:'transparent'}" onclick="openDetail('${e.id}')">
      <div class="num muted" style="font-size:12.5px">${e.date}</div>
      <div class="cat-cell"><div class="merch">${e.merch.replace(/"/g,'&quot;')}</div><div class="sub">${e.emp} · <span class="cattag">${e.cat}</span></div></div>
      <div class="acct-cell acct">${e.acct?e.acct:'<span class="faint">— internal —</span>'}</div>
      <div class="amt-cell r amt num">${money(e.amt)}</div>
      <div class="status-cell"><span class="status ${v.cls}">${dotFor(v.key)} ${v.label}</span></div>
      <div class="chev">›</div>
    </div>`;}).join('') || `<div style="padding:34px;text-align:center" class="muted">Nothing in this filter.</div>`;
}
function dotFor(k){const c={clear:'var(--green)',over:'var(--amber)',noact:'var(--rose)',dup:'var(--violet)',rcpt:'var(--amber)',appr:'var(--green)',rej:'var(--rose)'}[k];return `<span style="width:7px;height:7px;border-radius:50%;background:${c};display:inline-block"></span>`;}
function setThr(c,v){THRESH[c]=Math.max(0,parseFloat(v)||0);renderReview();}

/* ---------- DETAIL DRAWER ---------- */
function openDetail(id){
  const e=EXPENSES.find(x=>x.id===id);const v=evaluate(e);
  let timeline='';
  if(e.acct){
    const acts=(ACTIVITY[e.acct]||[]).slice().sort((a,b)=>DAYNUM(a)-DAYNUM(b));
    const all=Array.from(new Set([...acts,e.date])).sort((a,b)=>DAYNUM(a)-DAYNUM(b));
    timeline=`<div class="eyebrow" style="margin:18px 0 8px">Salesforce activity · ${e.acct}</div>
      <div class="tl">${all.map(d=>{const isExp=d===e.date;const hasAct=acts.includes(d);
        const cls=isExp?(hasAct?'match':'gap'):'';
        const lbl=hasAct?'Logged activity (call / meeting / visit)':'';
        return `<div class="tl__r ${cls}"><span class="d"></span><span class="num" style="width:54px">${d}</span><span style="flex:1">${isExp?`<b>Expense booked here</b>${hasAct?' — matches activity ✓':' — <span style="color:var(--rose)">no activity ✗</span>'}`:lbl}</span></div>`;}).join('')}</div>`;
  } else {
    timeline=`<div class="eyebrow" style="margin:18px 0 8px">Customer link</div><div class="muted" style="font-size:13px">No customer account on this expense — treated as internal, no CRM cross-check required.</div>`;
  }
  const resolved=resolutions[e.id];
  $('drawer').innerHTML=`
    <div class="drawer__h">
      <div><div class="eyebrow">${e.id} · ${e.cat}</div><div style="font-weight:700;font-size:16px;margin-top:3px">${e.merch.replace(/"/g,'&quot;')}</div></div>
      <button class="drawer__x" onclick="closeDrawer()">×</button>
    </div>
    <div class="drawer__b">
      <div class="bigamt num">${money(e.amt)}</div>
      <div style="margin-top:4px"><span class="status ${v.cls}">${dotFor(v.key)} ${v.label}</span></div>
      <div class="verdict" style="border-color:${v.flag?v.color:'var(--line2)'};background:${v.flag?'color-mix(in srgb,'+v.color+' 9%,transparent)':'var(--panel2)'}">
        <div class="verdict__h" style="color:${v.color}"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.6 4.6L18 9l-4.4 1.4L12 15l-1.6-4.6L6 9z" fill="currentColor"/></svg> AI assessment</div>
        <ul>${v.reasons.map(r=>`<li>${r}</li>`).join('')}</ul>
      </div>
      <div class="kv"><span class="k">Employee</span><span>${e.emp}</span></div>
      <div class="kv"><span class="k">Date</span><span class="num">${e.date}</span></div>
      <div class="kv"><span class="k">Account</span><span>${e.acct||'— internal —'}</span></div>
      <div class="kv"><span class="k">Category cap</span><span class="num">${THRESH[e.cat]!=null?money0(THRESH[e.cat]):'—'}</span></div>
      <div class="kv"><span class="k">Receipt</span><span>${e.rcpt?'Attached':'<span style="color:var(--amber)">Missing</span>'}</span></div>
      ${timeline}
    </div>
    <div class="drawer__f">
      ${resolved?`<div class="muted" style="align-self:center;font-size:13px">Resolved: <b style="color:${resolved==='approved'?'var(--green)':'var(--rose)'}">${resolved}</b></div><button class="btn btn--ghost btn--sm" onclick="resolve('${e.id}',null)">Undo</button>`
      :`<button class="btn btn--green btn--sm" onclick="resolve('${e.id}','approved')">Approve</button>
        <button class="btn btn--ghost btn--sm" onclick="toast('Justification requested from ${e.emp}')">Request justification</button>
        <button class="btn btn--rose btn--sm" onclick="resolve('${e.id}','rejected')">Reject</button>`}
    </div>`;
  $('drawer').classList.add('on');$('scrim').classList.add('on');
}
function closeDrawer(){$('drawer').classList.remove('on');$('scrim').classList.remove('on');}
function resolve(id,r){ if(r)resolutions[id]=r; else delete resolutions[id]; closeDrawer(); renderReview(); toast(r?`Expense ${id} ${r}`:'Resolution undone'); }

/* boot */
renderReview();
</script>
</body>
</html>
